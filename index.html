<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <!-- Sidebar -->
      <aside class="sidebar">
        <h2>Dashboard</h2>

        <ul>
          <li class="menu-item active" data-title="Overview">📊 Overview</li>
          <li class="menu-item" data-title="Analytics">📈 Analytics</li>
          <li class="menu-item" data-title="Users">👥 Users</li>
          <li class="menu-item" data-title="Settings">⚙ Settings</li>
        </ul>

        <button id="themeBtn">🌙 Toggle Theme</button>
      </aside>

      <!-- Main Content -->
      <main class="content">
        <header>
          <h1 id="pageTitle">Overview</h1>

          <input type="text" id="search" placeholder="Search activity..." />
        </header>

        <!-- Cards -->
        <section class="cards">
          <div class="card">
            <h3>Total Users</h3>
            <p class="counter" data-target="1245">0</p>
          </div>

          <div class="card">
            <h3>Revenue</h3>
            <h2 class="counter" data-target="92980" data-type="currency">0</h2>
          </div>

          <div class="card">
            <h3>Orders</h3>
            <p class="counter" data-target="392">0</p>
          </div>
        </section>

        <!-- Table -->
        <section class="table-section">
          <h2>Recent Activity</h2>

          <table>
            <thead>
              <tr>
                <th>User</th>
                <th>Action</th>
              </tr>
            </thead>

            <tbody>
              <tr>
                <td>Ali</td>
                <td>Created Order</td>
              </tr>

              <tr>
                <td>Sarah</td>
                <td>Updated Profile</td>
              </tr>

              <tr>
                <td>John</td>
                <td>Made Payment</td>
              </tr>

              <tr>
                <td>Emma</td>
                <td>Deleted Product</td>
              </tr>
            </tbody>
          </table>
        </section>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
